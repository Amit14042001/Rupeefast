# ──────────────────────────────────────────────
# RupeeFast — Docker Compose
# ──────────────────────────────────────────────
# Start everything with one command:
#   docker compose up -d
#
# Then visit http://localhost:3000
# ──────────────────────────────────────────────

services:

  # ── Redis (Rate Limiting, Cache, Sessions) ──
  # Available within Docker network at redis:6379
  # Host port is mapped to 6380 to avoid conflicts with local Redis installations
  redis:
    image: redis:7-alpine
    container_name: rupeefast-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]

  # ── PostgreSQL Database ────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rupeefast-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rupeefast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RupeeFast Backend (API + Frontend) ────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rupeefast-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: rupeefast
      PORT: 3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-random-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prometheus (Metrics Collection) ──────────
  prometheus:
    image: prom/prometheus:latest
    container_name: rupeefast-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      backend:
        condition: service_started

  # ── Grafana (Metrics Dashboard) ─────────────
  grafana:
    image: grafana/grafana:latest
    container_name: rupeefast-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
