name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (PostgreSQL ${{ matrix.pg-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pg-version: [15, 16, 17]
      fail-fast: false

    services:
      postgres:
        image: postgres:${{ matrix.pg-version }}-alpine
        env:
          POSTGRES_DB: rupeefast
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: rupeefast
      PGUSER: postgres
      PGPASSWORD: postgres
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend assets (index.html + screens.js)
        run: node ../app/src/main/assets/build-html.js

      - name: Apply database migrations
        run: npm run migrate:up

      - name: Run integration tests (against real PostgreSQL)
        run: npm run test:integration

      - name: Run unit tests with coverage
        run: npm run test:all

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-pg${{ matrix.pg-version }}
          path: backend/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # Migration rollback validation
  # Validates that down migrations cleanly reverse schema and that
  # re-applying migrations is idempotent.
  # ────────────────────────────────────────────────────────────────
  validate-migrations:
    name: Validate migration rollback
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rupeefast
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: rupeefast
      PGUSER: postgres
      PGPASSWORD: postgres
      NODE_ENV: test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply all migrations (up)
        run: npm run migrate:up

      - name: Assert 2 migrations applied
        run: |
          node -e '
            const { Pool } = require("pg");
            const p = new Pool({host:process.env.PGHOST||"localhost",port:parseInt(process.env.PGPORT||"5432"),database:process.env.PGDATABASE||"rupeefast",user:process.env.PGUSER||"postgres",password:process.env.PGPASSWORD||"postgres"});
            p.query("SELECT count(*) c FROM _migrations WHERE direction=\'up\'").then(r=>{
              const c = +r.rows[0].c;
              console.log("Applied:",c);
              if(c!==2){console.error("Expected 2, got",c);process.exit(1);}
              console.log("OK");
              p.end();
            }).catch(e=>{console.error(e.message);process.exit(1)});
          '

      - name: Roll back all migrations (down:all)
        run: npm run migrate:down:all

      - name: Assert 0 migrations after rollback
        run: |
          node -e '
            const { Pool } = require("pg");
            const p = new Pool({host:process.env.PGHOST||"localhost",port:parseInt(process.env.PGPORT||"5432"),database:process.env.PGDATABASE||"rupeefast",user:process.env.PGUSER||"postgres",password:process.env.PGPASSWORD||"postgres"});
            p.query("SELECT count(*) c FROM _migrations").then(r=>{
              const c = +r.rows[0].c;
              console.log("Migration records:",c);
              if(c!==0){console.error("Expected 0, got",c);process.exit(1);}
              console.log("Rollback verified");
              p.end();
            }).catch(e=>{console.error(e.message);process.exit(1)});
          '

      - name: Re-apply all migrations (up)
        run: npm run migrate:up

      - name: Assert 2 migrations applied again
        run: |
          node -e '
            const { Pool } = require("pg");
            const p = new Pool({host:process.env.PGHOST||"localhost",port:parseInt(process.env.PGPORT||"5432"),database:process.env.PGDATABASE||"rupeefast",user:process.env.PGUSER||"postgres",password:process.env.PGPASSWORD||"postgres"});
            p.query("SELECT count(*) c FROM _migrations WHERE direction=\'up\'").then(r=>{
              const c = +r.rows[0].c;
              console.log("Applied:",c);
              if(c!==2){console.error("Expected 2, got",c);process.exit(1);}
              console.log("Re-applied OK");
              p.end();
            }).catch(e=>{console.error(e.message);process.exit(1)});
          '

      - name: Verify all 8 tables exist after re-apply
        run: |
          node -e '
            const { Pool } = require("pg");
            const p = new Pool({host:process.env.PGHOST||"localhost",port:parseInt(process.env.PGPORT||"5432"),database:process.env.PGDATABASE||"rupeefast",user:process.env.PGUSER||"postgres",password:process.env.PGPASSWORD||"postgres"});
            p.query("SELECT table_name FROM information_schema.tables WHERE table_schema=\'public\' AND table_type=\'BASE TABLE\' ORDER BY table_name").then(r=>{
              const tables = r.rows.map(t=>t.table_name).sort();
              console.log("Tables:",tables.join(", "));
              const expected = ["_migrations","agent_tasks","investments","loans","payment_mandates","repayments","transactions","users"];
              const missing = expected.filter(t=>!tables.includes(t));
              if(missing.length){console.error("Missing:",missing.join(", "));process.exit(1);}
              console.log("All 8 tables present");
              p.end();
            }).catch(e=>{console.error(e.message);process.exit(1)});
          '

      - name: Run CRUD smoke test (INSERT → SELECT with JOIN → DELETE)
        run: |
          node -e '
            const { Pool } = require("pg");
            const p = new Pool({host:process.env.PGHOST||"localhost",port:parseInt(process.env.PGPORT||"5432"),database:process.env.PGDATABASE||"rupeefast",user:process.env.PGUSER||"postgres",password:process.env.PGPASSWORD||"postgres"});
            (async()=>{
              const u = await p.query("INSERT INTO users (mobile, role) VALUES ($1, $2) RETURNING id",["9999999999","borrower"]);
              const uid = u.rows[0].id;
              console.log("User:",uid);
              const l = await p.query("INSERT INTO loans (borrower_id, amount, repayment_plan, purpose, status) VALUES ($1, $2, $3, $4, $5) RETURNING id",[uid,5000,"Daily","smoke test","applied"]);
              const lid = l.rows[0].id;
              console.log("Loan:",lid);
              const s = await p.query("SELECT l.*, u.name FROM loans l JOIN users u ON u.id = l.borrower_id WHERE l.id = $1",[lid]);
              console.log("Joined:",JSON.stringify(s.rows[0]));
              await p.query("DELETE FROM loans WHERE id = $1",[lid]);
              await p.query("DELETE FROM users WHERE id = $1",[uid]);
              console.log("CRUD smoke test passed");
              await p.end();
            })();
          '
