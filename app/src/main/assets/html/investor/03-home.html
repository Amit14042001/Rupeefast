    <!-- ════════════════════════════════════════
         INVESTOR: HOME DASHBOARD
    ════════════════════════════════════════ -->
    <div class="screen" id="screen-i-home">
      <div class="top-nav" style="background:var(--green); border-bottom:none;">
        <div style="flex:1;">
          <p style="font-size:11px; opacity:0.7; margin-bottom:2px;">Portfolio Value</p>
          <h2 class="i-name" style="font-size:18px; font-weight:700;">₹45,200</h2>
        </div>
        <div style="display:flex; gap:14px; align-items:center;">
          <i class="ti ti-bell" style="font-size:22px;cursor:pointer;" onclick="showScreen('screen-i-notif')" role="button" tabindex="0" aria-label="Notifications"></i>
          <div style="width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700;">AS</div>
        </div>
      </div>
      <div class="scroll-body">
        <div class="hero-card" style="background:linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);">
          <p style="font-size:11px; opacity:0.8; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Interest Earned (May)</p>
          <div style="display:flex; align-items:baseline; gap:4px; margin-top:4px;">
            <span style="font-size:16px; font-weight:600;">₹</span>
            <span data-count-to="1455" style="font-size:32px; font-weight:800; letter-spacing:-0.5px;">1,455</span>
          </div>
          <div style="display:flex; gap:8px; margin-top:20px;">
            <button class="btn" style="flex:1; background:#fff; color:var(--green); margin:0; padding:10px; font-size:12px; font-weight:700;" onclick="showScreen('screen-i-invest')" aria-label="Invest more capital">Invest More</button>
            <button class="btn" style="flex:1; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:#fff; margin:0; padding:10px; font-size:12px; font-weight:700;" onclick="showScreen('screen-i-withdraw')" aria-label="Withdraw funds">Withdraw</button>
          </div>
        </div>

        <div class="metric-grid">
          <div class="metric">
            <div class="label">Annual ROI</div>
            <div class="value green"><span data-count-to="18.4" data-count-suffix="%" data-count-decimals="1">18.4%</span></div>
            <div class="sub">3.2% higher than Avg.</div>
          </div>
          <div class="metric">
            <div class="label">Live Loans</div>
            <div class="value blue"><span data-count-to="92">92</span></div>
            <div class="sub">Diversified portfolio</div>
          </div>
        </div>

        <div class="section-hdr"><h3>Active Portfolios</h3></div>
        <div class="card card-tint-green" style="margin-top:8px;cursor:pointer;" onclick="showScreen('screen-i-portfolio')" role="button" tabindex="0" aria-label="View SAFE bucket portfolio">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-weight:700; color:var(--green);">SAFE Bucket</div>
              <div style="font-size:12px; color:var(--text3); margin-top:2px;">₹<span data-count-to="32000" data-count-delay="100">32,000</span> invested</div>
            </div>
            <div style="text-align:right;">
              <div style="font-weight:700; color:var(--text);">14% ROI</div>
              <div style="font-size:11px; color:var(--green); font-weight:600;">0.2% Default</div>
            </div>
          </div>
        </div>

        <div class="card card-tint-amber" style="margin-top:10px;cursor:pointer;" onclick="showScreen('screen-i-portfolio')" role="button" tabindex="0" aria-label="View MODERATE bucket portfolio">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-weight:700; color:var(--amber);">MODERATE Bucket</div>
              <div style="font-size:12px; color:var(--text3); margin-top:2px;">₹<span data-count-to="13200" data-count-delay="200">13,200</span> invested</div>
            </div>
            <div style="text-align:right;">
              <div style="font-weight:700; color:var(--text);">22% ROI</div>
              <div style="font-size:11px; color:var(--amber); font-weight:600;">1.5% Default</div>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-nav g4">
        <button class="nav-item active" onclick="showITab('screen-i-home',this)"><i class="ti ti-layout-dashboard"></i><span>Overview</span></button>
        <button class="nav-item" onclick="showITab('screen-i-invest',this)"><i class="ti ti-plus"></i><span>Invest</span></button>
        <button class="nav-item" onclick="showITab('screen-i-loans',this)"><i class="ti ti-users"></i><span>Borrowers</span></button>
        <button class="nav-item" onclick="showITab('screen-i-profile',this)"><i class="ti ti-user"></i><span>Profile</span></button>
      </div>
    </div>
