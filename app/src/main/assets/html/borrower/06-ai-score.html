    <!-- BORROWER: AI TRUST SCORE (Standalone) -->
    <div class="screen" id="screen-b-ai-score" style="background:#0F172A;">
      <div class="top-nav" style="background:#0F172A; border-bottom:none;">

        <h2>AI Trust Score</h2>
