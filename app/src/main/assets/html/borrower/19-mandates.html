<!-- ════════════════════════════════════════
     BORROWER: MANAGE MANDATES
════════════════════════════════════════ -->
<div class="screen" id="screen-b-mandates">
  <div class="top-nav"><button class="back-btn" onclick="showScreen('screen-b-profile')" aria-label="Go back"><i class="ti ti-arrow-left"></i></button><h2>Manage Mandates</h2></div>
  <div class="scroll-body" style="background:var(--surface);">

    <!-- Loading state -->
    <div id="mandates-loading" style="text-align:center;padding:60px 24px;">
      <div class="spinner" style="width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;"></div>
      <p style="font-size:14px;color:var(--text3);">Loading your mandates...</p>
    </div>

    <!-- Empty state (hidden initially) -->
    <div id="mandates-empty" style="display:none;text-align:center;padding:60px 24px;">
      <div style="width:72px;height:72px;border-radius:50%;background:var(--primary-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px;color:var(--primary);"><i class="ti ti-receipt-off"></i></div>
      <h3 style="font-size:18px;font-weight:700;margin-bottom:6px;">No Mandates Yet</h3>
      <p style="font-size:13px;color:var(--text3);line-height:1.5;">Set up UPI AutoPay or NACH to automate your EMI payments and never miss a due date.</p>
      <button class="btn btn-primary" style="margin-top:20px;width:100%;" onclick="showScreen('screen-b-pay')"><i class="ti ti-plus-circle"></i> Set Up AutoPay</button>
    </div>

    <!-- Active Mandate Card (hidden initially) -->
    <div id="mandates-active-container" style="display:none;padding:16px;">
      <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Active Mandate</div>
      <div id="mandate-active-card" style="background:var(--card);border-radius:16px;padding:20px;border:1.5px solid var(--primary);box-shadow:0 4px 16px rgba(16,185,129,0.12);">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <div style="width:48px;height:48px;border-radius:12px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--green);flex-shrink:0;"><i class="ti ti-shield-check"></i></div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:16px;color:var(--text);" id="ma-method">UPI AutoPay</div>
            <div style="font-size:13px;color:var(--green);font-weight:600;margin-top:2px;" id="ma-status-badge">● Active</div>
          </div>
          <span class="badge badge-green" style="font-size:11px;padding:4px 10px;">LIVE</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;padding:12px;background:var(--surface);border-radius:10px;">
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:2px;">Amount</div>
            <div style="font-weight:700;font-size:15px;color:var(--text);" id="ma-amount">₹120</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:2px;">Frequency</div>
            <div style="font-weight:700;font-size:15px;color:var(--text);" id="ma-frequency">Daily</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:2px;">Remaining</div>
            <div style="font-weight:700;font-size:15px;color:var(--text);" id="ma-remaining">87 / 100</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--text3);margin-bottom:2px;">Activated</div>
            <div style="font-weight:700;font-size:15px;color:var(--text);" id="ma-activated">15 May 2025</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="ma-pause-btn" class="btn btn-outline" style="flex:1;font-size:13px;padding:10px;" onclick="toggleMandateStatus('pause')"><i class="ti ti-player-pause"></i> Pause</button>
          <button id="ma-resume-btn" class="btn btn-outline" style="flex:1;font-size:13px;padding:10px;display:none;" onclick="toggleMandateStatus('resume')"><i class="ti ti-player-play"></i> Resume</button>
          <button class="btn btn-outline" style="flex:1;font-size:13px;padding:10px;color:var(--red);border-color:var(--red);" onclick="cancelMandateById()"><i class="ti ti-trash"></i> Cancel</button>
        </div>
      </div>
    </div>

    <!-- All Mandates History -->
    <div id="mandates-history" style="display:none;padding:16px;">
      <div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">All Mandates</div>
      <div id="mandates-list" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>

  </div>
</div>
